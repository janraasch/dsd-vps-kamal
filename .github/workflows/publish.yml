name: Publish

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-pypi-publish:
    name: Upload release to Test PyPI
    runs-on: ubuntu-latest

    environment:
      name: test-pypi
      url: https://test.pypi.org/project/dsd-vps-kamal/

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build
        run: uv build

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

